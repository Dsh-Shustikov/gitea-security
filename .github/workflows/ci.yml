name: Gitea-Security — SAST + Gateway

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sast:
    name: "SAST Analysis"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Get repo name
        run: echo "REPO_NAME=$(basename ${{ github.repository }})" >> $GITHUB_ENV
      - name: Create dirs
        run: mkdir -p reports/${{ env.REPO_NAME }}/{sast,metrics}
      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: -no-fail -fmt=json -out=reports/${{ env.REPO_NAME }}/sast/gosec-report.json ./...
        continue-on-error: true
      - name: Run semgrep
        run: |
          pip install semgrep
          semgrep --config=auto --json -o reports/${{ env.REPO_NAME }}/sast/semgrep-report.json . || true
        continue-on-error: true
      - name: Generate SAST metrics
        run: |
          HIGH=0; MEDIUM=0; LOW=0
          if [ -f reports/${{ env.REPO_NAME }}/sast/gosec-report.json ]; then
            HIGH=$(grep -c '"severity": "HIGH"' reports/${{ env.REPO_NAME }}/sast/gosec-report.json 2>/dev/null || echo 0)
            MEDIUM=$(grep -c '"severity": "MEDIUM"' reports/${{ env.REPO_NAME }}/sast/gosec-report.json 2>/dev/null || echo 0)
            LOW=$(grep -c '"severity": "LOW"' reports/${{ env.REPO_NAME }}/sast/gosec-report.json 2>/dev/null || echo 0)
          fi
          echo "{\"repo\":\"${{ env.REPO_NAME }}\",\"tool\":\"gosec\",\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"high\":$HIGH,\"medium\":$MEDIUM,\"low\":$LOW}" > reports/${{ env.REPO_NAME }}/metrics/sast.json
      - name: Upload SAST reports
        uses: actions/upload-artifact@v4
        with:
          name: sast-${{ env.REPO_NAME }}
          path: reports/${{ env.REPO_NAME }}/
          retention-days: 30

  security-checks:
    name: "Security Checks"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get repo name
        run: echo "REPO_NAME=$(basename ${{ github.repository }})" >> $GITHUB_ENV
      - name: Create dirs
        run: mkdir -p reports/${{ env.REPO_NAME }}/{security,metrics}
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
      - name: Copy Gitleaks results
        run: cp results.sarif reports/${{ env.REPO_NAME }}/security/ 2>/dev/null || echo "clean" > reports/${{ env.REPO_NAME }}/security/clean.txt
      - name: Generate security metrics
        run: |
          LEAKS=0
          if [ -f results.sarif ]; then
            LEAKS=$(grep -c '"level":"error"' results.sarif 2>/dev/null || echo 0)
          fi
          echo "{\"repo\":\"${{ env.REPO_NAME }}\",\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"gitleaks_leaks\":$LEAKS,\"trivy_critical\":0,\"trivy_high\":0}" > reports/${{ env.REPO_NAME }}/metrics/security.json
      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-${{ env.REPO_NAME }}
          path: reports/${{ env.REPO_NAME }}/
          retention-days: 30

  security-gate:
    name: "Security Gateway"
    runs-on: ubuntu-latest
    needs: [sast, security-checks]
    steps:
      - uses: actions/checkout@v4
      - name: Get repo name
        run: echo "REPO_NAME=$(basename ${{ github.repository }})" >> $GITHUB_ENV
      - name: Download SAST reports
        uses: actions/download-artifact@v4
        with:
          name: sast-${{ env.REPO_NAME }}
          path: reports/
      - name: Security Gate
        run: |
          echo "=== Security Gate: ${{ env.REPO_NAME }} ==="
          if [ -f reports/sast/gosec-report.json ]; then
            HIGH=$(grep -c '"severity": "HIGH"' reports/sast/gosec-report.json 2>/dev/null || echo 0)
            echo "HIGH: $HIGH"
            if [ "$HIGH" -gt 0 ]; then echo "BLOCKED"; exit 1; fi
          fi
          echo "PASSED"
      - name: Comment PR on failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## 🔴 Security Gateway — деплой заблокирован\n\nОбнаружены уязвимости HIGH.\n\nПроверьте логи Actions.'
            })

  deploy:
    name: "Deploy to VPS"
    runs-on: ubuntu-latest
    needs: [security-gate]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Get repo name
        run: echo "REPO_NAME=$(basename ${{ github.repository }})" >> $GITHUB_ENV
      - name: Generate deploy metrics
        run: |
          mkdir -p reports/${{ env.REPO_NAME }}/metrics
          echo "{\"repo\":\"${{ env.REPO_NAME }}\",\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"status\":\"success\"}" > reports/${{ env.REPO_NAME }}/metrics/deploy.json
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "[$(date)] Deploy: ${{ env.REPO_NAME }}" >> /var/log/deploy.log
      - name: Upload deploy metrics
        uses: actions/upload-artifact@v4
        with:
          name: deploy-${{ env.REPO_NAME }}
          path: reports/${{ env.REPO_NAME }}/metrics/deploy.json
          retention-days: 30
