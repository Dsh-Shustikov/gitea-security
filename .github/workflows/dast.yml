name: Gitea-Security — DAST

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Gitea-Security — SAST"]
    types: [completed]
    branches: [main]

jobs:
  zap-scan:
    name: "OWASP ZAP Scan"
    runs-on: ubuntu-latest
    steps:
      - name: Start test instance
        run: |
          docker run -d --name test-app -p 3000:3000 gitea/gitea:latest
          echo "Waiting for Gitea..."
          for i in 1 2 3 4 5 6 7 8; do
            sleep 15
            CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 2>/dev/null || echo 0)
            echo "  Attempt $i: HTTP $CODE"
            [ "$CODE" = "200" ] && break
          done
      - name: OWASP ZAP Scan
        run: |
          mkdir -p ./zap-reports && chmod 777 ./zap-reports
          docker run --network host -v $PWD/zap-reports:/zap/wrk -t ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t http://localhost:3000 -m 6 -D 120 \
            -r /zap/wrk/zap-report.html -x /zap/wrk/zap-report.xml || true
          ls -la ./zap-reports/
      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: ./zap-reports/
          retention-days: 30
      - name: Cleanup
        if: always()
        run: docker stop test-app && docker rm test-app
