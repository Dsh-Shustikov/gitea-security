name: Gitea-Security — SAST

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sast:
    name: "SAST Analysis"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Get repo name
        run: echo "REPO_NAME=$(basename ${{ github.repository }})" >> $GITHUB_ENV
      - name: Create dirs
        run: mkdir -p reports/${{ env.REPO_NAME }}/{sast,metrics}
      - name: Downgrade Go version in go.mod
        run: sed -i 's/go 1\.[0-9]*\.[0-9]*/go 1.24/' go.mod
      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: -no-fail -fmt=json -out=reports/${{ env.REPO_NAME }}/sast/gosec-report.json ./...
        continue-on-error: true
        env:
          GOTOOLCHAIN: local
      - name: Run semgrep
        run: |
          pip install semgrep
          semgrep --config=auto --json -o reports/${{ env.REPO_NAME }}/sast/semgrep-report.json . || true
        continue-on-error: true
      - name: Run ESLint
        run: npx eslint . --ext .js,.ts,.vue -f json -o reports/${{ env.REPO_NAME }}/sast/eslint-report.json 2>/dev/null || echo "{}" > reports/${{ env.REPO_NAME }}/sast/eslint-report.json
        continue-on-error: true
      - name: Generate SAST metrics
        run: |
          HIGH=0; MEDIUM=0; LOW=0
          if [ -f reports/${{ env.REPO_NAME }}/sast/gosec-report.json ]; then
            HIGH=$(grep -c '"severity": "HIGH"' reports/${{ env.REPO_NAME }}/sast/gosec-report.json 2>/dev/null || echo 0)
            MEDIUM=$(grep -c '"severity": "MEDIUM"' reports/${{ env.REPO_NAME }}/sast/gosec-report.json 2>/dev/null || echo 0)
            LOW=$(grep -c '"severity": "LOW"' reports/${{ env.REPO_NAME }}/sast/gosec-report.json 2>/dev/null || echo 0)
          fi
          echo "{\"repo\":\"${{ env.REPO_NAME }}\",\"high\":$HIGH,\"medium\":$MEDIUM,\"low\":$LOW}" > reports/${{ env.REPO_NAME }}/metrics/sast.json
      - name: Upload SAST reports
        uses: actions/upload-artifact@v4
        with:
          name: sast-${{ env.REPO_NAME }}
          path: reports/${{ env.REPO_NAME }}/
          retention-days: 30
