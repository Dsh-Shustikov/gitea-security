name: Gitea-Security — SAST + DAST

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sast:
    name: "SAST Analysis"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Get repo name
        run: echo "REPO_NAME=$(basename ${{ github.repository }})" >> $GITHUB_ENV
      - name: Create dirs
        run: mkdir -p reports/${{ env.REPO_NAME }}/{sast,metrics}
      - name: Downgrade Go version
        run: sed -i 's/go 1\.[0-9]*\.[0-9]*/go 1.24/' go.mod
      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: -no-fail -fmt=json -out=reports/${{ env.REPO_NAME }}/sast/gosec-report.json ./...
        continue-on-error: true
        env:
          GOTOOLCHAIN: local
      - name: Run semgrep
        run: |
          pip install semgrep
          semgrep --config=auto --json -o reports/${{ env.REPO_NAME }}/sast/semgrep-report.json . || true
        continue-on-error: true
      - name: Run ESLint
        run: npx eslint . --ext .js,.ts,.vue -f json -o reports/${{ env.REPO_NAME }}/sast/eslint-report.json 2>/dev/null || echo "{}" > reports/${{ env.REPO_NAME }}/sast/eslint-report.json
        continue-on-error: true
      - name: Generate SAST metrics
        run: |
          HIGH=0; MEDIUM=0; LOW=0
          if [ -f reports/${{ env.REPO_NAME }}/sast/gosec-report.json ]; then
            HIGH=$(grep -c '"severity": "HIGH"' reports/${{ env.REPO_NAME }}/sast/gosec-report.json 2>/dev/null || echo 0)
            MEDIUM=$(grep -c '"severity": "MEDIUM"' reports/${{ env.REPO_NAME }}/sast/gosec-report.json 2>/dev/null || echo 0)
            LOW=$(grep -c '"severity": "LOW"' reports/${{ env.REPO_NAME }}/sast/gosec-report.json 2>/dev/null || echo 0)
          fi
          echo "{\"repo\":\"${{ env.REPO_NAME }}\",\"high\":$HIGH,\"medium\":$MEDIUM,\"low\":$LOW}" > reports/${{ env.REPO_NAME }}/metrics/sast.json
      - name: Upload SAST reports
        uses: actions/upload-artifact@v4
        with:
          name: sast-${{ env.REPO_NAME }}
          path: reports/${{ env.REPO_NAME }}/
          retention-days: 30

  dast:
    name: "DAST — OWASP ZAP"
    runs-on: ubuntu-latest
    needs: sast
    steps:
      - name: Start Gitea
        run: |
          docker run -d --name gitea-dast -p 3000:3000 gitea/gitea:latest
          sleep 45
          curl -s -o /dev/null -w "HTTP: %{http_code}" http://localhost:3000
      - name: ZAP Scan
        run: |
          mkdir -p ./zap-reports && chmod 777 ./zap-reports
          docker run --network host -v $PWD/zap-reports:/zap/wrk -t ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t http://localhost:3000 \
            -r /zap/wrk/zap-report.html -x /zap/wrk/zap-report.xml || true
          ls -la ./zap-reports/
      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: ./zap-reports/
          retention-days: 30
      - name: Cleanup
        if: always()
        run: docker stop gitea-dast && docker rm gitea-dast
